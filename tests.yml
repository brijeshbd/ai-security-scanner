name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run walker tests
        run: python tests/test_walker.py

      - name: Run stripper tests
        run: python tests/test_stripper.py

      # Analyzer test is skipped in CI because it requires Ollama.
      # To test the analyzer, run it locally: python tests/test_analyzer.py